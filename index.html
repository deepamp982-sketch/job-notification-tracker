<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Job Notification App – Design System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles/design-system.css" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <script src="scripts/app.js" defer></script>
  </head>
  <body>
    <div class="app-root">
      <main class="app-shell">
        <!-- Top Bar -->
        <header class="top-bar">
          <div class="top-bar__brand">Job Notification App</div>

          <button
            class="nav-toggle"
            type="button"
            aria-label="Toggle navigation"
            aria-expanded="false"
            data-nav-toggle
          >
            Menu
          </button>

          <nav class="primary-nav" aria-label="Primary" data-primary-nav>
            <a href="/dashboard" class="primary-nav__link" data-route="/dashboard"
              >Dashboard</a
            >
            <a href="/saved" class="primary-nav__link" data-route="/saved">Saved</a>
            <a href="/digest" class="primary-nav__link" data-route="/digest"
              >Digest</a
            >
            <a href="/settings" class="primary-nav__link" data-route="/settings"
              >Settings</a
            >
            <a href="/proof" class="primary-nav__link" data-route="/proof">Proof</a>
          </nav>
        </header>

        <!-- Context Header -->
        <section class="context-header">
          <h1 class="context-header__title" id="page-title">Dashboard</h1>
          <p class="context-header__subtitle" id="page-subtitle">
            This section will be built in the next step.
          </p>
        </section>

        <!-- Workspace -->
        <section class="workspace">
          <!-- Primary Workspace (70%) -->
          <div class="workspace__primary"></div>

          <!-- Secondary Panel (30%) -->
          <aside class="workspace__secondary"></aside>
        </section>

        <!-- Proof Footer -->
        <footer class="proof-footer">
          <div class="proof-footer__label">Proof checklist</div>
          <div class="proof-footer__checklist">
            <div class="proof-footer__item">
              <div class="proof-footer__box"></div>
              <span class="proof-footer__label-text">UI Built</span>
            </div>
            <div class="proof-footer__item">
              <div class="proof-footer__box"></div>
              <span class="proof-footer__label-text">Logic Working</span>
            </div>
            <div class="proof-footer__item">
              <div class="proof-footer__box"></div>
              <span class="proof-footer__label-text">Test Passed</span>
            </div>
            <div class="proof-footer__item">
              <div class="proof-footer__box"></div>
              <span class="proof-footer__label-text">Deployed</span>
            </div>
          </div>
        </footer>
      </main>
    </div>
  </body>
</html>
